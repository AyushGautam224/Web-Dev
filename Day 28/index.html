<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css position</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;

        }

        .box1 {
            background-color: blue;
            position: sticky;
            top: 0px;
            height: 50px;
            width: 100%;
            margin: 0px;
            padding: 0px;
           /* position: absolute;
            top: 0px;
            left: 8vw;*/
        }

        .box2 {
            background-color: darkblue;
        }

        .box3 {
            background-color: darkcyan;
        }

        .box4 {
            background-color: orange;
        }

        .box {
            border: 2px solid black;
            height: 250px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
        }
        .parent{
            padding: 3px;
            margin: 34px;
            border: 2px solid purple;
            /*As an exception
           /* position: absolute;*/
          /* position: relative;
           transform: translate(0);
           filter: invert(0);
           perspective: 0em;*/
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>

</html>
