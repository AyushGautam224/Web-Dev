<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul li {
            display: flex;
            background-color: aqua;

        }

        .header {
            position: sticky;
            top: 0;
        }

        * {
            margin: 0;
            padding: 0;

        }

        nav {
            display: flex;
            background-color: rgb(229, 32, 58);
            padding: 20px;
        }

        .outer-box {
            background-color: green;
            padding: 10px;
            display: flex;
            margin: 10px;
            height: 400px;
            width: 970px;


        }

        .inner-box1 {
            width: 320px;
            height: 220px;
            background-color: #df2a2a;
            border: 1px solid #000;
            display: flex;
            margin: 70px;
            padding: 3px;
        }

        .inner-box2 {
            width: 300px;
            height: 200px;
            background-color: #2c29dd;
            border: 1px solid #000;
            margin: 70px;
            padding: 10px;

        }



        .box1 {
            background-color: rgb(7, 5, 5);
            color: #fbf4f4;
            justify-content: center;
            padding: 50px;
            border: 3px solid black;
            width: 300px;
            border-radius: 13px;
            margin: 70px 26vw;

        }


        .box2 {
            background-color: rgb(13, 218, 218);

            padding: 35px;
        }

        .orangebox {

            border-radius: 50px;
            position: fixed;
            background-color: #ee8a0f;
            color: rgb(1, 8, 152);
            margin: 25px;
            top: 380px;
            right: 1px;
            padding: 30px;

        }
        /* .orangebox { 
            border-radius: 50px;
            position: fixed;
            background-color: orange;
            color: white;
            margin: 25px;
            top: 400px;
            right: 1px;
            padding: 20px;
            
        } */
    </style>
</head>

<body>
    <header>
        <nav>

        </nav>
    </header>
    <div class="outer-box">
        <div class="inner-box1"></div>
        <div class="inner-box2"></div>
    </div>
    <div class="box1">
        <h4>hey welcome to ayush web</h4>
    </div>
    <div class="orangebox">

    </div>
    <footer>
        <div class="box2">

        </div>
    </footer>
</body>

</html>
