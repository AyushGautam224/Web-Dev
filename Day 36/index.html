<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css multicolor</title>
    <style>
        <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    </style>
    <style>

        :root {
            --primary-color: #8a2be2;
            --text-color:white;
        }
        :root {
            --primary-color: #8a2be2;
            --text-color:white;
            --secondary-color:#ac6ce9;
        }
        :root {
            --primary-color: #31e715;
            --text-color:white;
            --secondary-color:#4bf3e2;
        }
        
        * {
            margin: 0;
            padding: 0;

            .poppins-regular {
                font-family: "Poppins", sans-serif;

            }

        }

        ul li {
            list-style: none;

        }

        nav {
            background-color: #8a2be2;
            padding: 12px 0;
            color: white;
        }

        ul li {
            display: inline;
            padding: 24px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li>Home</li>
                <li>Services</li>
                <li>About</li>
                <li>contact</li>
            </ul>
        </nav>
    </header>
</body>

</html>
