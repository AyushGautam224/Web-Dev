<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS BOX MODEL</title>
    <style>
        .box{
            background-color: azure;

        }
        .box1{
           color: rgb(27, 101, 101);
           margin: 5px;
           border: 2px solid blue;
           height: 200px;
           box-sizing: border-box;

        }
        .box2{
            color: rgb(233, 20, 20);
            margin: 15px;
           border: 2px solid rgb(6, 6, 6);
           height: 200px;
           box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="box box1">i am doog</div>
    <div class="box box2">i am g doog</div>
</body>
</html>
