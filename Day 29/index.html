<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS card design</title>
    <style>
        * {
            background-color: rgb(109, 113, 116);
        }

        .card {
            background-color: rgb(255, 255, 255);
            border: 3px solid rgb(255, 255, 255);
            height: 330px;
            width: 200px;
            margin: 0px;
            border-radius: 7px;
        }

        .image {
            margin: 5px;
            border-radius: 7px;
        }

        .content {
            font-size: 12px;
            background-color: rgb(252, 252, 252);
            margin: 15px;

        }

        .content p {
            background-color: white;
            font-size: 10px;
        }

        .content h1 {
            background-color: white;
            font-size: 20px;
        }

        .capsules {
            background-color: white;
            padding: 0 16px;

        }

        .capsules span {
            background-color: white;
            border: 2px solid gray;
            padding: 0 6px;
            border-radius: 7px;
            font-size: 10px;
        }

        .button {
            background-color: white;
            text-align: center;
        }
        .button button{
            padding: 9px;
            border: 9px;
            background-color: white;
            border-radius:18px;
            font-size: 10px;
            background-color: rgb(205, 232, 249);
            color: rgb(16, 87, 220);

    
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="image">
            <img width="188" src="hh.webp">
        </div>
        <div class="capsules">
            <span>Nature</span>
            <span>Lake</span>
        </div>

        <div class="content">
            <h1>ayush</h1>
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Voluptatibus, tempore blanditiis in fugiat enim
                pariatur quasi et? Optio odio molestias aliquam dolorem!</p>
        </div>
        <div class="button">
            <button>Read More</button>
        </div>
    </div>

</body>

</html>
