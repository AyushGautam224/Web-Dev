<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition And Animation Exercise</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            height: 121px;
            width: 121px;
            background-color: rgb(170, 0, 0);
            border-radius: 70px;
            position: absolute;
            bottom: 0;
            left: 0;
            animation: animateX 3s linear infinite ,
            animateY 1s ease-out infinite alternate;

            /* transform: rotate(40deg); */
            /* transform: rotate(0.5turn); */
            /* transform: rotateX(40deg); */
            /* transform: rotateY(40deg); */
            /* transform: scaleX(1.6); */
            /* transform: scaleY(1.6); */
            /* transform: skew(35deg); */
            /* transform: translateY(100%) skew(40deg) translateX(50%); */

            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes animateX {
            from {
                left: 0;
            }

            to {
                left: 100%;
            }

        }

        @keyframes animateY {
            from {
                bottom: 0;
            }

            to {
                bottom: 100%;
            }

        }

        .container {
            position: relative;
            height: 80vh;
            width: 80vw;
            background-color: blue;

            ;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            <h5>hey</h5>
        </div>
    </div>
</body>

</html>
