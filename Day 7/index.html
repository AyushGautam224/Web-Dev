<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Lets learn it</title>
</head>
<body>
    <h1>Hello this form To Apply For A Job</h1>
    <action="post">
        <div>
            <label for="username">Enter Your Username</label> <input type="text" id="username" name="username" placeholder="Enter your username">
        </div>
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>
        <div>
            <input type="checkbox" id="Subscribe" name="subscribe" value="yes">
            <label for="subscribe">Subscribe to Notification</label>
        </div>
        <div>
            <label for="comment">enter your comment</label>
            <br>
            <textarea id="comment" name="comment" rows="5" cols="54"></textarea>
        </div>
        <div>
           
            <select name="cars">
  <option value="volvo">Volvo</option>
  <option value="saab">Saab</option>
  <option value="mercedes">Mercedes</option>
  <option value="audi">Audi</option>
</select>
        </div>
    </action>
</body>
</html>
